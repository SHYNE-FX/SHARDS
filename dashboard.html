<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>
    <link rel="icon" href="Images/logo.svg" type="image/svg">

    <!-- CSS -->
    <style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap');

* {
    margin: 0;
    padding: 0;
    text-decoration: none;
    font-family: 'Poppins';
}

section {
    height: 100vh;
    width: 100%;
    background: url(Images/map35.svg) center center no-repeat ;
    background-size: cover;
}

header {
    height: 12vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
}

h1 {
    font-size: 4.5vh;
    font-weight: 700;
    color: #f1f1f1;
}

h1 img {
    height: 3vh;
}

header a {
    height: 2vh;
    width: 2vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

header a img {
    height: 2vh;
}

main {
    height: calc(100vh - 12vh);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

div.searchBox {
    height: 6vh;
    width: 37vh;
    border: none;
    border-radius: 0.8vh;
    font-size: 1.75vh;
    font-weight: 500;
    color: #f1f1ff;
    background-color: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(.8vh);
    margin: 1vh 0;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: space-evenly;
}

input.searchBox {
    height: 100%;
    width: 70%;
    padding-left: 0vh;
    background-color: transparent;
    outline: none;
    border: none;
    color: #f1f1ff;
}

img.searchIcon {
    height: 1.9vh;
    margin-top: 0.5vh;
}

div.latestInsights {
    height: 40vh;
    width: 37vh;
    padding: 2.5vh 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    flex-direction: column;
    margin-top: 4.5vh;
    background-color: rgba(25, 25, 25, 0.9);
    backdrop-filter: blur(2vh);
    border-radius: 1vh;
}

div.latestInsightsText {
    height: 10vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
}

div.latestInsightsText h2 {
    font-size: 2.5vh;
    font-weight: 600;
    color: #f1f1ff;
    margin: 1vh 0;
}

div.latestInsightsText a {
    font-size: 1.75vh;
    font-weight: 500;
    color: #b3d4f7;
    margin: 1vh 0;
}

div.latestInsightsChips {
    height: calc(35vh - 5vh);
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
}

div.chip1 {
    height: 100%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-direction: column;
}

div.chipInfo {
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    height: 6vh;
    width: 100%;
}

div.chipInfo button {
    border: transparent;
    border-radius: 5vh;
    padding: .5vh 1.8vh;
    font-size: 2vh;
    font-weight: 600;
    background-color: #b3d4f7;
    color: #111;
}

div.chipInfo p {
    font-size: 1.75vh;
    font-weight: 500;
    color: #cdcdcd;
}

div.chipBody {
    height: calc(35vh - 10vh);
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-direction: column;
    padding: 0 4vh;
}

div.chipBody h1 {
    font-size: 2vh;
    font-weight: 600;
    color: #f1f1ff;
    width: 78%;
}

div.chipBody p {
    font-size: 1.5vh;
    font-weight: 500;
    color: #b1b1b1;
    width: 78%;
}

div.chipFooter {
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    height: 6vh;
    width: 100%;
}

div.chipFooter a {
    font-size: 1.75vh;
    font-weight: 500;
    color: #f1f1ff;
}

div.chipFooter button {
    border: transparent;
    border-radius: 5vh;
    font-size: 2vh;
    background-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
}

div.chipFooter button img {
    height: 2vh;
}

    </style>

</head>
<body>

    <section>
        
        <header>
        
            <h1><img src="Images/logo.svg" alt=""> SHARDS</h1>

            <a href="#"><img src="Images/menu-button.svg" alt="Menu Button"></a>
        
        </header>

        <main>
            <div class="searchBox" id="searchBox">
                <input type="text" placeholder="Search...." class="searchBox" id="searchBox">
                <a href=""><img src="Images/search-icon.svg" alt="Search Icon" class="searchIcon"></a>
            </div>

            <div class="latestInsights" id="latestInsights">
                <div class="latestInsightsText">
                    <h2>Latest Insights</h2>
                    <a href="">VIEW ALL</a>
                </div>

                <div class="latestInsightsChips">
                    <div class="chip1">
                        <div class="chipInfo">
                            <a href="https://www.anthropic.com/research/anthropic-economic-index-january-2026-report"><button>Equity</button></a>
                            <p>January 15th, 2026</p>
                        </div>

                        <div class="chipBody">
                            <h1>Anthropic Economic Index report: Economic primitives</h1>
                            <p>This report introduces new metrics of AI usage to provide a rich portrait of interactions with Claude....</p>
                            <div class="chipFooter">
                                <a href="">Anthropic</a>
                                <a href=""><button><img src="Images/bookmark.svg" alt=""></button></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </section>
    
</body>
</html>
